<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>Cozy Calc</title>
</head>
<body>

    <div class="box">
        <h2>Cozy Calculator</h2>
        <form method="POST">
            <input type="number" name="n1" step="any" required placeholder="0">
            <select name="op">
                <option value="+">+</option>
                <option value="-">-</option>
                <option value="*">×</option>
                <option value="/">÷</option>
            </select>
            <input type="number" name="n2" step="any" required placeholder="0">
            <button type="submit">=</button>
        </form>
        
        {% if result != "" %}
            <div class="score">Answer: {{ result }}</div>
        {% endif %}
    </div>

</body>
</html>
